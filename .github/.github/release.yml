changelog:
  categories:
    - title: "🛡️ Security Fixes"
      labels:
        - "security"
        - "vulnerability"
        - "cve"
    - title: "⚠️ Breaking Changes"
      labels:
        - "breaking-change"
        - "major"
    - title: "🚀 New Features"
      labels:
        - "feature"
        - "enhancement"
        - "new-stuff"
    - title: "🐛 Bug Fixes"
      labels:
        - "bug"
        - "fix"
        - "patch"
    - title: "📦 Dependency Upgrades"
      labels:
        - "dependencies"
        - "dependencies-label"
    - title: "📖 Documentation"
      labels:
        - "documentation"
        - "docs"
    - title: "🧪 Testing & QA"
      labels:
        - "tests"
        - "qa"
    - title: "🏠 Maintenance & Refactoring"
      labels:
        - "chore"
        - "refactor"
        - "performance"
    - title: "🤖 CI/CD & Build"
      labels:
        - "ci"
        - "github-actions"
        - "build"
  exclude:
    labels:
      - "skip-changelog"
      - "wip"
      - "duplicate"
    authors:
      - "github-actions[bot]"
