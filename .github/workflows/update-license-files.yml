name: Update License Files

on:
  push:
    branches: [ "2.x" ]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-license-files:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.10'

      - name: Set up JDK 21
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5.3.0
        with:
          distribution: temurin
          java-version: 21

      - name: Ensure clean state without storm artifacts
        run: rm -rf ~/.m2/repository/org/apache/storm

      - name: Build Storm
        run: mvn clean install -B -DskipTests -Dcheckstyle.skip -Dpmd.skip
        env:
          MAVEN_OPTS: -Xmx2048m

      - name: Update license files
        run: python3 dev-tools/update-license-files.py --skip-build-storm

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "Regenerate license files after dependency changes"
          committer: GitHub <noreply@github.com>
          author: ${{ github.actor }} <${{ github.actor }}@users.noreply.github.com>
          signoff: true
          branch: update-license-files-2.x
          base: 2.x
          delete-branch: true
          title: "[Automated] Update license files after dependency changes (2.x)"
          body: |
            This PR was automatically generated after a push to 2.x caused
            license files to become out of date.

            Updated files:
            - `DEPENDENCY-LICENSES`
            - `LICENSE-binary` (binary dependencies section)

            Please review the changes and merge if correct.
          labels: dependencies
