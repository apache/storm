# CLIENT-side config for submitting topologies to the local docker cluster from
# outside the containers (e.g. running a storm-perf main() from IntelliJ).
# Point it at this file with -Dstorm.conf.file=<abs path to this file>.
#
# docker-compose.yml publishes Nimbus Thrift on localhost:6627, so the submitter
# only needs to know where Nimbus lives. Port (6627) and transport
# (SimpleTransportPlugin, no auth) match the cluster defaults.
nimbus.seeds: ["localhost"]
